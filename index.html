<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة الإحصاءات الاجتماعية والبيئية | قسم الاجتماعية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Tajawal', Arial, sans-serif; direction: rtl; background: #f0f4f8; color: #1c2833; min-height: 100vh; }

.accent-bar { height: 4px; background: linear-gradient(90deg,#1abc9c,#2e86c1); }

header {
  background: #1a5276; color: white;
  padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 60px;
}
header h1 { font-size: 1rem; font-weight: 700; }
header .meta { font-size: 0.75rem; opacity: 0.75; text-align: left; }

.stats-bar {
  display: flex; gap: 0.6rem; padding: 0.8rem 1.5rem;
  background: white; border-bottom: 1px solid #dce6f0; overflow-x: auto; flex-wrap: wrap;
}
.chip {
  display: inline-flex; align-items: center; gap: 0.35rem;
  padding: 0.28rem 0.8rem; border-radius: 2rem; font-size: 0.78rem; font-weight: 500;
  cursor: pointer; white-space: nowrap; border: 2px solid transparent; transition: border 0.2s;
}
.chip.active { border-color: currentColor; }

.toolbar {
  display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 1.5rem; flex-wrap: wrap;
}
.btn-add {
  background: #1abc9c; color: white; border: none; padding: 0.5rem 1.2rem;
  border-radius: 8px; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer;
}
.btn-add:hover { background: #17a589; }
.btn-refresh {
  background: white; color: #1a5276; border: 1px solid #dce6f0;
  padding: 0.48rem 1rem; border-radius: 8px; font-family: inherit; font-size: 0.85rem; cursor: pointer;
}
.search-wrap { position: relative; }
.search-wrap input {
  padding: 0.48rem 0.9rem 0.48rem 2rem; border: 1px solid #dce6f0; border-radius: 8px;
  font-family: inherit; font-size: 0.88rem; outline: none; background: white; width: 240px;
}
.search-wrap .ico { position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%); color: #aaa; }
.team-badge { font-size: 0.78rem; color: #aaa; margin-right: auto; }

.table-wrap { padding: 0 1.5rem 2rem; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(26,82,118,0.08); min-width: 1050px; }
thead th {
  padding: 0.75rem 0.8rem; font-weight: 600; font-size: 0.78rem;
  text-align: right; background: #1a5276; color: white; white-space: nowrap;
}
tbody tr { border-bottom: 1px solid #f0f4f8; }
tbody tr:nth-child(even) { background: #fafcff; }
tbody tr:hover { background: #f0f7ff; }
tbody td { padding: 0.7rem 0.8rem; font-size: 0.82rem; vertical-align: middle; }

.period-tag { background: #eaf4fb; color: #2e86c1; padding: 0.15rem 0.55rem; border-radius: 4px; font-size: 0.75rem; font-weight: 500; }
.status-badge {
  display: inline-flex; align-items: center; gap: 0.3rem;
  padding: 0.22rem 0.65rem; border-radius: 2rem; font-size: 0.75rem; font-weight: 600; white-space: nowrap;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.btn-edit, .btn-del {
  background: none; border: 1px solid #dce6f0; padding: 0.22rem 0.55rem;
  border-radius: 6px; font-family: inherit; font-size: 0.75rem; cursor: pointer; margin-left: 0.3rem;
}
.btn-edit { color: #1a5276; }
.btn-edit:hover { background: #1a5276; color: white; }
.btn-del { color: #e74c3c; }
.btn-del:hover { background: #e74c3c; color: white; border-color: #e74c3c; }

.empty { text-align: center; padding: 3rem; color: #aaa; font-size: 1rem; }

/* Modal */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: white; border-radius: 14px; padding: 1.8rem;
  width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18); animation: up 0.22s ease;
}
@keyframes up { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
.modal-title { font-size: 1.05rem; font-weight: 700; color: #1a5276; margin-bottom: 1.2rem; padding-bottom: 0.6rem; border-bottom: 2px solid #1abc9c; }
.field { margin-bottom: 0.85rem; }
.field label { display: block; font-size: 0.8rem; font-weight: 600; color: #6c7a89; margin-bottom: 0.3rem; }
.field input, .field select, .field textarea {
  width: 100%; padding: 0.55rem 0.8rem; border: 1px solid #dce6f0; border-radius: 8px;
  font-family: inherit; font-size: 0.9rem; outline: none; background: #fafcff;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: #1abc9c; }
.field textarea { resize: vertical; min-height: 70px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 1rem; }
.btn-save { background: #1abc9c; color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 8px; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
.btn-cancel { background: none; border: 1px solid #dce6f0; padding: 0.6rem 1rem; border-radius: 8px; font-family: inherit; font-size: 0.9rem; cursor: pointer; color: #6c7a89; }

/* Toast */
.toast {
  display: none; position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: #1a5276; color: white; padding: 0.6rem 1.4rem; border-radius: 8px;
  font-size: 0.88rem; z-index: 300; box-shadow: 0 4px 16px rgba(0,0,0,0.2); white-space: nowrap;
}
.toast.show { display: block; }

/* Export btn */
.btn-export { background: white; color: #27ae60; border: 1px solid #27ae60; padding: 0.48rem 1rem; border-radius: 8px; font-family: inherit; font-size: 0.85rem; cursor: pointer; }
.btn-import { background: white; color: #8e44ad; border: 1px solid #8e44ad; padding: 0.48rem 1rem; border-radius: 8px; font-family: inherit; font-size: 0.85rem; cursor: pointer; }
</style>
</head>
<body>

<div class="accent-bar"></div>
<header>
  <h1>📊 نظام إدارة الإحصاءات الاجتماعية والبيئية | قسم الاجتماعية</h1>
  <div class="meta">
    <div id="dateDisplay"></div>
    <div id="syncDisplay" style="color:#1abc9c;margin-top:2px"></div>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="toolbar">
  <button class="btn-add" onclick="openModal()">＋ إضافة طلب</button>
  <div class="search-wrap">
    <span class="ico">🔍</span>
    <input type="text" placeholder="بحث..." oninput="render()" id="searchInput">
  </div>
  <button class="btn-export" onclick="exportData()">📤 تصدير JSON</button>
  <button class="btn-export" onclick="exportExcel()">📊 تصدير Excel</button>
  <button class="btn-import" onclick="document.getElementById('importFile').click()">📥 استيراد JSON</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  <button class="btn-refresh" onclick="loadFromSheet(true)">🔄 تحديث من الفريق</button>
  <span class="team-badge">☁️ البيانات مشتركة تلقائياً مع الفريق عبر Google Sheets</span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>اسم التقرير</th>
        <th>دورية التقرير</th>
        <th>الحالة</th>
        <th>تاريخ التسليم - الرزنامة</th>
        <th>تاريخ الرفع - التقارير الموحد</th>
        <th>تاريخ الرفع - العلاقات العامة</th>
        <th>تاريخ النشر</th>
        <th>الملاحظات</th>
        <th>الإجراءات</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">إضافة طلب جديد</div>
    <div class="field"><label>اسم التقرير *</label><input id="fTitle" placeholder="مثال: تقرير مؤشرات سوق العمل"></div>
    <div class="field">
      <label>دورية التقرير *</label>
      <select id="fPeriod">
        <option value="">— اختر —</option>
        <option>شهري</option>
        <option>سنوي</option>
        <option>سنتين</option>
        <option>3 سنوات</option>
        <option>5 سنوات</option>
      </select>
    </div>
    <div class="field">
      <label>حالة الطلب *</label>
      <select id="fStatus">
        <option value="">— اختر —</option>
        <option>لم يبدأ</option><option>متأخر</option><option>تجميع البيانات</option>
        <option>قيد المراجعة</option><option>نظام العلاقات العامة</option>
        <option>نظام التقارير الموحد</option><option>تم النشر</option>
      </select>
    </div>
    <div class="field"><label>تاريخ التسليم - الرزنامة</label><input type="date" id="fDateCalDelivery"></div>
    <div class="field"><label>تاريخ الرفع - التقارير الموحد</label><input type="date" id="fDateSystem"></div>
    <div class="field"><label>تاريخ الرفع - العلاقات العامة</label><input type="date" id="fDatePR"></div>
    <div class="field"><label>تاريخ النشر</label><input type="date" id="fDatePublish"></div>
    <div class="field"><label>الملاحظات</label><textarea id="fNotes" placeholder="أي تفاصيل إضافية..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
      <button class="btn-save" onclick="saveRequest()">حفظ الطلب</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_API = 'https://script.google.com/macros/s/AKfycbypBvWbhcCbAnD10T547tFihsL3dEQWJpJabJADWjgBnd3PyPThuwRSLZwNxNHocEgqdA/exec';
const STATUSES = [
  { label:'لم يبدأ',              bg:'#f0f4f8', color:'#6c7a89', icon:'⏳' },
  { label:'متأخر',                bg:'#fdedec', color:'#e74c3c', icon:'🔴' },
  { label:'تجميع البيانات',       bg:'#eaf4fb', color:'#2e86c1', icon:'📥' },
  { label:'قيد المراجعة',         bg:'#fef9e7', color:'#d4ac0d', icon:'🔎' },
  { label:'نظام العلاقات العامة', bg:'#f4ecf7', color:'#8e44ad', icon:'📢' },
  { label:'نظام التقارير الموحد', bg:'#e8f8f5', color:'#1abc9c', icon:'📋' },
  { label:'تم النشر',             bg:'#eafaf1', color:'#27ae60', icon:'🚀' },
];

const KEY = 'stat_social_v1';
let data = JSON.parse(localStorage.getItem(KEY) || '[]');
let filterStatus = null;
let editId = null;
let syncing = false;

function save() { localStorage.setItem(KEY, JSON.stringify(data)); syncToSheet(); }

async function syncToSheet() {
  if (!SHEET_API || syncing) return;
  syncing = true;
  updateSyncDisplay('🔄 جاري المزامنة...');
  try {
    await fetch(SHEET_API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ data })
    });
    updateSyncDisplay('✅ تمت المزامنة مع الفريق — ' + new Date().toLocaleTimeString('ar-SA'));
  } catch (err) {
    updateSyncDisplay('⚠️ تعذرت المزامنة — البيانات محفوظة على جهازك فقط');
  }
  syncing = false;
}

async function loadFromSheet(showFeedback) {
  if (!SHEET_API) return;
  if (showFeedback) updateSyncDisplay('🔄 جاري التحميل من الفريق...');
  try {
    const res = await fetch(SHEET_API, { method: 'GET' });
    const remote = await res.json();
    if (Array.isArray(remote)) {
      data = remote;
      save_local_only();
      renderStats(); render();
      updateSyncDisplay('✅ محدّث من الفريق — ' + new Date().toLocaleTimeString('ar-SA'));
      if (showFeedback) showToast('🔄 تم تحديث البيانات من الفريق');
    }
  } catch (err) {
    updateSyncDisplay('⚠️ تعذر الاتصال بالفريق — يعرض آخر نسخة محفوظة على جهازك');
  }
}

function save_local_only() { localStorage.setItem(KEY, JSON.stringify(data)); }

function updateSyncDisplay(msg) {
  const el = document.getElementById('syncDisplay');
  if (el) el.textContent = msg;
}
function fmtDate(v) {
  if (!v) return '<span style="color:#ccc">—</span>';
  return new Date(v).toLocaleDateString('ar-SA', {year:'numeric',month:'short',day:'numeric'});
}

function renderStats() {
  const bar = document.getElementById('statsBar');
  const all = { label:'الكل', count:data.length, bg:'#f0f4f8', color:'#1a5276', icon:'📋' };
  const chips = [all, ...STATUSES.map(s => ({ ...s, count: data.filter(r=>r.status===s.label).length }))];
  bar.innerHTML = chips.map((c,i) => `
    <div class="chip ${filterStatus===(i===0?null:c.label)?'active':''}"
      style="background:${c.bg};color:${c.color}"
      onclick="setFilter(${i===0?'null':`'${c.label}'`})">
      ${c.icon} <strong>${c.count}</strong> ${c.label}
    </div>`).join('');
}

function setFilter(s) { filterStatus = s; renderStats(); render(); }

function render() {
  const q = document.getElementById('searchInput').value.trim();
  const rows = data.filter(r => {
    const ms = !filterStatus || r.status === filterStatus;
    const mq = !q || r.title.includes(q) || (r.notes||'').includes(q);
    return ms && mq;
  });
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty">📭 لا توجد طلبات</div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map((r,i) => {
    const st = STATUSES.find(x=>x.label===r.status)||{};
    return `<tr>
      <td style="font-weight:600">${r.title}</td>
      <td><span class="period-tag">${r.period}</span></td>
      <td>
        <span class="status-badge" style="background:${st.bg||'#eee'};color:${st.color||'#666'}">
          <span class="dot"></span>${st.icon||''} ${r.status}
        </span>
      </td>
      <td style="color:#6c7a89;font-size:0.78rem">${fmtDate(r.dateCalDelivery)}</td>
      <td style="color:#6c7a89;font-size:0.78rem">${fmtDate(r.dateSystem)}</td>
      <td style="color:#6c7a89;font-size:0.78rem">${fmtDate(r.datePR)}</td>
      <td style="color:#6c7a89;font-size:0.78rem">${fmtDate(r.datePublish)}</td>
      <td style="color:#6c7a89;font-size:0.78rem;max-width:130px">${r.notes||'—'}</td>
      <td>
        <button class="btn-edit" onclick="openEdit('${r.id}')">✏️</button>
        <button class="btn-del" onclick="del('${r.id}')">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

function openModal() { editId=null; clearForm(); document.getElementById('modalTitle').textContent='إضافة طلب جديد'; document.getElementById('overlay').classList.add('open'); }
function openEdit(id) {
  editId=id;
  const r=data.find(x=>String(x.id)===String(id));
  document.getElementById('fTitle').value=r.title||'';
  document.getElementById('fPeriod').value=r.period||'';
  document.getElementById('fDateCalDelivery').value=r.dateCalDelivery||'';
  document.getElementById('fDateSystem').value=r.dateSystem||'';
  document.getElementById('fDatePR').value=r.datePR||'';
  document.getElementById('fDatePublish').value=r.datePublish||'';
  document.getElementById('fStatus').value=r.status||'';
  document.getElementById('fNotes').value=r.notes||'';
  document.getElementById('modalTitle').textContent='تعديل الطلب';
  document.getElementById('overlay').classList.add('open');
}
function clearForm() {
  ['fTitle','fPeriod','fDateCalDelivery','fDateSystem','fDatePR','fDatePublish','fStatus','fNotes']
    .forEach(id => document.getElementById(id).value='');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function saveRequest() {
  const title=document.getElementById('fTitle').value.trim();
  const period=document.getElementById('fPeriod').value;
  const status=document.getElementById('fStatus').value;
  if(!title||!period||!status){showToast('⚠️ يرجى تعبئة الحقول المطلوبة');return;}
  const entry = {
    title, period, status,
    dateCalDelivery: document.getElementById('fDateCalDelivery').value,
    dateSystem:      document.getElementById('fDateSystem').value,
    datePR:          document.getElementById('fDatePR').value,
    datePublish:     document.getElementById('fDatePublish').value,
    notes:           document.getElementById('fNotes').value.trim(),
  };
  if(editId) {
    const idx=data.findIndex(x=>String(x.id)===String(editId));
    data[idx]={...data[idx],...entry};
    showToast('✅ تم تحديث الطلب');
  } else {
    data.unshift({id:Date.now().toString(),...entry});
    showToast('✅ تم إضافة الطلب');
  }
  save(); closeModal(); renderStats(); render();
}

function del(id) {
  if(!confirm('هل أنت متأكد من حذف هذا الطلب؟'))return;
  data=data.filter(x=>String(x.id)!==String(id));
  save(); showToast('🗑️ تم الحذف'); renderStats(); render();
}

function exportData() {
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='احصاءات-اجتماعية-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  showToast('📤 تم تصدير البيانات');
}

async function exportExcel() {
  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet('التقارير', { views: [{ rightToLeft: true }] });

  const headersMap = [
    ['title','اسم التقرير',32],
    ['period','دورية التقرير',12],
    ['status','الحالة',20],
    ['dateCalDelivery','تاريخ التسليم - الرزنامة',16],
    ['dateSystem','تاريخ الرفع - التقارير الموحد',18],
    ['datePR','تاريخ الرفع - العلاقات العامة',18],
    ['datePublish','تاريخ النشر',14],
    ['notes','الملاحظات',35],
  ];
  const nCols = headersMap.length;
  const NAVY = 'FF1A5276', TEAL = 'FF1ABC9C', LIGHT = 'FFEAF4FB', STRIPE = 'FFF7FAFC';

  const statusColors = {
    'لم يبدأ':              { bg:'FFD9D9D9', fg:'FF595959' },
    'متأخر':                { bg:'FFF8CBAD', fg:'FFC00000' },
    'تجميع البيانات':       { bg:'FFBDD7EE', fg:'FF1F4E78' },
    'قيد المراجعة':         { bg:'FFFFE699', fg:'FF806000' },
    'نظام العلاقات العامة': { bg:'FFD9C3E8', fg:'FF4B2E6F' },
    'نظام التقارير الموحد': { bg:'FFC6E0B4', fg:'FF375623' },
    'تم النشر':             { bg:'FFA9D08E', fg:'FF375623' },
  };

  // Title rows
  ws.mergeCells(1,1,1,nCols);
  const t1 = ws.getCell(1,1);
  t1.value = 'نظام إدارة الإحصاءات الاجتماعية والبيئية | قسم الاجتماعية';
  t1.font = { name:'Arial', size:16, bold:true, color:{argb:'FFFFFFFF'} };
  t1.fill = { type:'pattern', pattern:'solid', fgColor:{argb:NAVY} };
  t1.alignment = { horizontal:'center', vertical:'middle' };
  ws.getRow(1).height = 28;

  ws.mergeCells(2,1,2,nCols);
  const t2 = ws.getCell(2,1);
  const today = new Date().toISOString().slice(0,10);
  t2.value = 'تقرير حالة التقارير — تاريخ الإصدار: ' + today;
  t2.font = { name:'Arial', size:11, italic:true, color:{argb:'FFFFFFFF'} };
  t2.fill = { type:'pattern', pattern:'solid', fgColor:{argb:TEAL} };
  t2.alignment = { horizontal:'center', vertical:'middle' };
  ws.getRow(2).height = 18;

  // Summary counts
  const counts = {};
  data.forEach(r => { counts[r.status] = (counts[r.status]||0) + 1; });
  const summary = Object.entries(counts).map(([k,v]) => `${k}: ${v}`).join('   |   ') + `   |   الإجمالي: ${data.length}`;
  ws.mergeCells(3,1,3,nCols);
  const t3 = ws.getCell(3,1);
  t3.value = summary;
  t3.font = { name:'Arial', size:10, bold:true, color:{argb:'FF1A5276'} };
  t3.fill = { type:'pattern', pattern:'solid', fgColor:{argb:LIGHT} };
  t3.alignment = { horizontal:'center', vertical:'middle' };
  ws.getRow(3).height = 20;

  ws.getRow(4).height = 6;

  const HEADER_ROW = 5;
  headersMap.forEach(([key,label,width], j) => {
    const c = ws.getCell(HEADER_ROW, j+1);
    c.value = label;
    c.font = { name:'Arial', size:11, bold:true, color:{argb:'FFFFFFFF'} };
    c.fill = { type:'pattern', pattern:'solid', fgColor:{argb:NAVY} };
    c.alignment = { horizontal:'center', vertical:'middle', wrapText:true };
    c.border = { top:{style:'thin',color:{argb:'FFB7C6D6'}}, bottom:{style:'thin',color:{argb:'FFB7C6D6'}}, left:{style:'thin',color:{argb:'FFB7C6D6'}}, right:{style:'thin',color:{argb:'FFB7C6D6'}} };
    ws.getColumn(j+1).width = width;
  });
  ws.getRow(HEADER_ROW).height = 32;

  data.forEach((r, i) => {
    const rowIdx = HEADER_ROW + 1 + i;
    headersMap.forEach(([key,label], j) => {
      const c = ws.getCell(rowIdx, j+1);
      c.value = r[key] || '';
      c.font = { name:'Arial', size:10 };
      c.alignment = { horizontal:'center', vertical:'middle', wrapText:(key==='title'||key==='notes') };
      c.border = { top:{style:'thin',color:{argb:'FFB7C6D6'}}, bottom:{style:'thin',color:{argb:'FFB7C6D6'}}, left:{style:'thin',color:{argb:'FFB7C6D6'}}, right:{style:'thin',color:{argb:'FFB7C6D6'}} };
      if (rowIdx % 2 === 0) c.fill = { type:'pattern', pattern:'solid', fgColor:{argb:STRIPE} };
    });
    const statusCell = ws.getCell(rowIdx, 3);
    const sc = statusColors[r.status];
    if (sc) {
      statusCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:sc.bg} };
      statusCell.font = { name:'Arial', size:10, bold:true, color:{argb:sc.fg} };
    }
  });

  const lastRow = HEADER_ROW + data.length;
  ws.views = [{ rightToLeft:true, state:'frozen', ySplit: HEADER_ROW }];
  ws.autoFilter = { from:{row:HEADER_ROW,column:1}, to:{row:lastRow,column:nCols} };
  ws.pageSetup = { orientation:'landscape', fitToPage:true, fitToWidth:1, fitToHeight:0, margins:{left:0.3,right:0.3,top:0.5,bottom:0.5,header:0.2,footer:0.2} };

  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  saveAs(blob, 'احصاءات-اجتماعية-'+today+'.xlsx');
  showToast('📊 تم تصدير ملف Excel');
}

function importData(e) {
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try {
      const imported=JSON.parse(ev.target.result);
      if(!Array.isArray(imported))throw new Error();
      data=imported; save(); renderStats(); render();
      showToast('📥 تم استيراد '+imported.length+' سجل');
    } catch { showToast('⚠️ ملف غير صالح'); }
  };
  reader.readAsText(file);
  e.target.value='';
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById('dateDisplay').textContent=new Date().toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

renderStats(); render();
loadFromSheet(false);
setInterval(() => loadFromSheet(false), 30000);
</script>
</body>
